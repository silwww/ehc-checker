<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EHC Checker — Full Report</title>
<link rel="stylesheet" href="/css/design-system.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="/assets/fonts/geist-fonts-base64.js"></script>
<script src="/assets/generate-pdf.js"></script>
<script src="/assets/render-report.js"></script>
<script src="/assets/loader-tips.js"></script>
<script src="/assets/loader-controller.js"></script>
</head>
<body>

<header class="app-header no-print">
  <div class="container app-header-inner">
    <div>
      <div class="app-brand">EHC Checker</div>
      <div class="app-tagline">Full Report</div>
    </div>
    <div class="row">
      <a href="/" class="text-sm text-medium">← Back to Checker</a>
    </div>
  </div>
</header>

<main class="container app-main">

  <section id="report-section" hidden></section>

  <section id="audit-loading" hidden style="margin-top: 32px;">
    <div id="audit-loading-shaggy" class="card-flat"></div>
  </section>

  <section id="audit-error-card" hidden style="margin-top: 32px;">
    <div class="flag-card flag-card-hard">
      <div class="flag-card-header">
        <h4 class="flag-card-title">Audit report failed</h4>
        <span class="badge badge-hard">ERROR</span>
      </div>
      <div id="audit-error-msg" class="flag-card-body" style="white-space: pre-wrap;"></div>
      <div style="margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap;">
        <button id="btn-audit-retry" class="btn btn-primary">Retry</button>
        <button id="btn-audit-close" class="btn btn-secondary">Close tab</button>
      </div>
    </div>
  </section>

  <section id="audit-empty" hidden style="margin-top: 32px;">
    <div class="card-flat">
      <h2 class="text-lg text-medium" style="margin-bottom: 8px;">No audit payload available</h2>
      <p class="text-sm text-secondary" style="margin-bottom: 12px;">
        Please run a check from the home page first.
      </p>
      <a href="/" class="btn btn-primary" style="text-decoration: none;">Run a check</a>
    </div>
  </section>

</main>

<footer class="app-footer">
  <div class="container">
    <div class="text-mono">EHC Checker Audit · v0.1</div>
    <div class="auth-status" id="authStatus" hidden>
      <span class="auth-status-label">Logged in as OV</span>
      <button type="button" class="auth-logout-btn" id="authLogoutBtn">Log out</button>
    </div>
  </div>
</footer>

<script>
(function () {
  const reportEl = document.getElementById('report-section');
  const emptyEl = document.getElementById('audit-empty');
  const loadingEl = document.getElementById('audit-loading');
  const loadingShaggy = document.getElementById('audit-loading-shaggy');
  const errorCardEl = document.getElementById('audit-error-card');
  const errorMsgEl = document.getElementById('audit-error-msg');
  const retryBtn = document.getElementById('btn-audit-retry');
  const closeBtn = document.getElementById('btn-audit-close');

  const params = new URLSearchParams(window.location.search);
  const action = params.get('action');

  retryBtn.addEventListener('click', () => {
    errorCardEl.hidden = true;
    runGenerate();
  });
  closeBtn.addEventListener('click', () => {
    window.close();
  });

  // Existing path: render an already-generated report sitting in sessionStorage
  // under audit_report_payload (set by the previous flow's window.open after
  // fetch completed). Kept verbatim so manual / test flows still work.
  function runDisplay() {
    let data = null;
    try {
      const raw = sessionStorage.getItem('audit_report_payload');
      if (raw) data = JSON.parse(raw);
    } catch (e) {
      console.error('Failed to parse audit_report_payload:', e);
    }
    if (!data) {
      emptyEl.hidden = false;
      return;
    }
    showReport(data);
  }

  // New path: receive the live File[] over BroadcastChannel from the main
  // tab, fetch /api/check/stream?mode=full from this tab, and render the result.
  //
  // Sequence:
  //   1. Refresh-after-success short-circuit: if a cached report sits in
  //      sessionStorage, render it without listening or fetching.
  //   2. Defensive: confirm BroadcastChannel exists (very old browsers).
  //   3. Show loading state immediately so the user has feedback.
  //   4. Open the channel, attach 'payload' listener, post 'ready'.
  //   5. 5-second timeout: if no payload arrives, show the error card.
  //   6. On 'payload': close channel, build FormData, fetch.
  function runGenerate() {
    // Refresh-after-success: cached report wins, no channel needed.
    const cachedRaw = sessionStorage.getItem('audit_report_payload');
    if (cachedRaw) {
      try {
        showReport(JSON.parse(cachedRaw));
        return;
      } catch (_) {}
    }

    if (typeof BroadcastChannel !== 'function') {
      showError('Your browser does not support BroadcastChannel. Please use Chrome, Firefox, Safari 15+, or Edge.');
      return;
    }

    showLoading();

    let channel;
    try {
      channel = new BroadcastChannel('ehc-audit-channel');
    } catch (e) {
      hideLoading();
      showError('Could not open audit channel: ' + e.message);
      return;
    }

    let received = false;
    const timeoutId = setTimeout(() => {
      if (received) return;
      try { channel.close(); } catch (_) {}
      hideLoading();
      showError('Could not receive audit payload from main tab. Please close this tab and try again from the report.');
    }, 5000);

    channel.onmessage = async (event) => {
      const msg = event && event.data;
      if (!msg || msg.type !== 'payload') return;
      if (received) return;
      received = true;
      clearTimeout(timeoutId);
      try { channel.close(); } catch (_) {}

      const files = Array.isArray(msg.files) ? msg.files : [];
      const overrides = msg.overrides || {};
      const consignorId = msg.consignorId || 'auto';

      try {
        await runAuditProgressiveStream(files, overrides, consignorId);
      } catch (err) {
        console.warn('[audit] /api/check/stream failed:', err.message);
        hideLoading();
        reportEl.hidden = true;
        reportEl.innerHTML = '';
        showError('Audit failed: ' + err.message);
      }
    };

    // Tell the opener we're listening.
    try {
      channel.postMessage({ type: 'ready' });
    } catch (e) {
      clearTimeout(timeoutId);
      try { channel.close(); } catch (_) {}
      hideLoading();
      showError('Could not signal main tab: ' + e.message);
    }
  }

  // Build the FormData payload for /api/check/stream?mode=full —
  // files, overrides, and consignor selection.
  function buildAuditFormData(files, overrides, consignorId) {
    const formData = new FormData();
    for (const file of files) {
      formData.append('files', file, file.name);
    }
    if (overrides && Object.keys(overrides).length > 0) {
      formData.append('classification_overrides', JSON.stringify(overrides));
    }
    formData.append('consignorId', consignorId || 'auto');
    return formData;
  }

  // Progressive SSE consumer for /api/check/stream?mode=full. Events:
  // started / final_report / flag / verdict / done. Throws on any
  // failure so the caller can surface the error to the user.
  async function runAuditProgressiveStream(files, overrides, consignorId = 'auto') {
    if (typeof ReadableStream === 'undefined') {
      throw new Error('ReadableStream not supported');
    }

    const formData = buildAuditFormData(files, overrides, consignorId);

    let currentReport = {
      overall_verdict: '—',
      counters: { hard_errors: 0, medium_warnings: 0, low_notices: 0 },
      flags: [],
      sections: [],
      checks_performed: [],
      rule_set_update_recommendations: '',
      certificate_info: {},
      report_mode: 'full'
    };
    const helpers = {
      onPrint: () => window.EHCGeneratePDF.generate(currentReport, 'full')
    };

    const response = await fetch('/api/check/stream?mode=full', { method: 'POST', body: formData });
    if (!response.ok || !response.body) {
      let payload = {};
      try { payload = await response.json(); } catch (_) {}
      throw new Error(payload.message || ('HTTP ' + response.status));
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';
    let progressiveStarted = false;
    let doneSeen = false;
    let errorPayload = null;

    function ensureReportVisible() {
      if (progressiveStarted) return;
      progressiveStarted = true;
      hideLoading();
      reportEl.hidden = false;
      window.EHCRenderReport.streaming.init(reportEl, helpers);
    }

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      let idx;
      while ((idx = buffer.indexOf('\n\n')) !== -1) {
        const rawEvent = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);

        let eventName = 'message';
        let dataLine = '';
        for (const line of rawEvent.split('\n')) {
          if (line.startsWith(':')) continue; // keep-alive comment
          if (line.startsWith('event:')) eventName = line.slice(6).trim();
          else if (line.startsWith('data:')) dataLine += line.slice(5).replace(/^\s/, '');
        }

        let data = null;
        if (dataLine) {
          try { data = JSON.parse(dataLine); }
          catch (e) {
            console.warn('[audit-sse-stream] failed to parse data:', e);
            continue;
          }
        }

        switch (eventName) {
          case 'started':
            if (data && data.message) window.EHCShaggyLoader.setSecondaryStatus(data.message);
            break;
          case 'final_report':
            ensureReportVisible();
            currentReport.certificate_info = data.certificate_info || {};
            currentReport.sections = data.sections || [];
            currentReport.rule_set_update_recommendations = data.rule_set_update_recommendations || '';
            currentReport.rule_set_version = data.rule_set_version;
            currentReport.processing_time_seconds = data.processing_time_seconds;
            currentReport.tokens_used = data.tokens_used;
            currentReport.checker_model = data.checker_model;
            currentReport.report_mode = data.report_mode;
            if (data.checks_performed != null) currentReport.checks_performed = data.checks_performed;
            window.EHCRenderReport.streaming.appendCompact(currentReport.certificate_info);
            window.EHCRenderReport.streaming.appendSections(currentReport);
            window.EHCRenderReport.streaming.appendRecommendations(currentReport);
            break;
          case 'flag':
            ensureReportVisible();
            if (data && data.severity) {
              currentReport.flags.push(data);
              window.EHCRenderReport.streaming.appendFlag(data, false);
            }
            break;
          case 'verdict':
            ensureReportVisible();
            currentReport.overall_verdict = data.overall_verdict || '—';
            currentReport.counters = {
              hard_errors: data.hard_errors || 0,
              medium_warnings: data.medium_warnings || 0,
              low_notices: data.low_notices || 0
            };
            window.EHCRenderReport.streaming.prependVerdict(currentReport);
            break;
          case 'done':
            doneSeen = true;
            ensureReportVisible();
            try {
              sessionStorage.setItem('audit_report_payload', JSON.stringify(currentReport));
            } catch (_) {
              // Storage write failure is non-fatal — refresh won't restore.
            }
            window.EHCRenderReport.streaming.finalize(currentReport, helpers);
            break;
          case 'error':
            errorPayload = data || { message: 'Stream error' };
            break;
          default:
            break;
        }

        if (doneSeen || errorPayload) break;
      }
      if (doneSeen || errorPayload) break;
    }

    if (errorPayload) {
      throw new Error(errorPayload.message || 'Stream error');
    }
    if (!doneSeen) {
      throw new Error('Stream closed before done');
    }
  }

  function showLoading() {
    reportEl.hidden = true;
    emptyEl.hidden = true;
    errorCardEl.hidden = true;
    loadingEl.hidden = false;
    window.EHCShaggyLoader.start(loadingShaggy);
  }
  function hideLoading() {
    window.EHCShaggyLoader.stop();
    loadingEl.hidden = true;
  }
  function showError(msg) {
    errorMsgEl.textContent = msg;
    errorCardEl.hidden = false;
  }

  function showReport(data) {
    reportEl.hidden = false;
    window.EHCRenderReport.render(reportEl, data, {
      onPrint: () => window.EHCGeneratePDF.generate(data, 'full')
    });
  }

  // Dispatch — placed at the bottom so every declaration above is initialised
  // before either path runs. (Function declarations hoist, but `const` does not.)
  if (action === 'generate') {
    runGenerate();
  } else {
    runDisplay();
  }
})();
</script>

<script>
(async function initAuthStatus() {
  try {
    const r = await fetch('/api/auth/status');
    const data = await r.json();
    if (data.authEnabled && data.authenticated) {
      document.getElementById('authStatus').hidden = false;
    }
  } catch (e) {
    // Auth status endpoint unavailable — Scenario C (auth removed). Stay hidden.
  }
  document.getElementById('authLogoutBtn')?.addEventListener('click', async () => {
    await fetch('/logout', { method: 'POST' });
    window.location.href = '/login';
  });
})();
</script>

</body>
</html>
