<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EHC Checker — UK Export Health Certificate verification</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --font-head: 'Poppins', system-ui, sans-serif; --font-body: 'DM Sans', system-ui, sans-serif; }
  body { font-family: var(--font-body); color: #374151; background: #f9fafb; }
  h1,h2,h3,h4,h5,h6 { font-family: var(--font-head); color: #111827; }
  .spinner { width:42px; height:42px; border:4px solid #dbeafe; border-top-color:#2563eb; border-radius:50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .kv { display:grid; grid-template-columns: max-content 1fr; gap:4px 12px; font-size: 0.875rem; }
  .kv dt { color:#6b7280; font-weight:500; }
  .kv dd { color:#111827; }
  table.report { width:100%; border-collapse: collapse; font-size: 0.875rem; }
  table.report th, table.report td { border:1px solid #e5e7eb; padding:8px 10px; text-align:left; vertical-align: top; }
  table.report th { background:#f3f4f6; font-family: var(--font-head); font-weight:600; color:#111827; }
  .pill { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:0.75rem; font-weight:600; }
  .pill-pass { background:#dcfce7; color:#166534; }
  .pill-hard { background:#fee2e2; color:#991b1b; }
  .pill-med  { background:#fef3c7; color:#92400e; }
  .pill-low  { background:#dbeafe; color:#1e40af; }
  @media print {
    body { background:#fff; }
    header, footer, #upload-section, #loading-section, .no-print { display:none !important; }
    #report-section { display:block !important; }
    .shadow, .shadow-sm, .shadow-md, .shadow-lg { box-shadow:none !important; }
    .bg-red-50, .bg-amber-50, .bg-blue-50, .bg-green-50 { background:#fff !important; }
    main { padding:0 !important; }
    .card { border:1px solid #e5e7eb; page-break-inside: avoid; }
  }
</style>
</head>
<body class="min-h-screen">

<header class="bg-white border-b border-gray-200">
  <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between gap-4 flex-wrap">
    <div>
      <h1 class="text-2xl font-bold">EHC Checker</h1>
      <p class="text-sm text-gray-500">UK Export Health Certificate verification</p>
    </div>
    <div class="flex items-center gap-3">
      <span class="pill pill-pass">Rule Set v1.7 — April 2026</span>
      <a href="admin.html" class="text-sm text-blue-600 hover:text-blue-700 font-medium">Admin →</a>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-8">

  <!-- UPLOAD -->
  <section id="upload-section">
    <div class="card bg-white rounded-lg shadow p-6 md:p-8">
      <h2 class="text-xl font-semibold mb-1">Run a check</h2>
      <p class="text-sm text-gray-500 mb-6">Upload the EHC PDF and any supporting documents.</p>

      <form id="check-form" class="space-y-5">
        <div>
          <label for="cert-type" class="block text-sm font-medium text-gray-700 mb-1">Certificate type</label>
          <select id="cert-type" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
            <option value="auto">Auto-detect from PDF</option>
            <option value="8468">EHC 8468 — Dairy for human consumption</option>
            <option value="8322">EHC 8322 — Dairy not for human consumption (Cat 3 ABP)</option>
          </select>
        </div>

        <div>
          <label for="ehc-pdf" class="block text-sm font-medium text-gray-700 mb-1">EHC PDF <span class="text-red-600">*</span></label>
          <input id="ehc-pdf" type="file" accept=".pdf" required
            class="block w-full text-sm text-gray-700 file:mr-3 file:py-2 file:px-4 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
        </div>

        <div>
          <label for="delivery-notes" class="block text-sm font-medium text-gray-700 mb-1">Delivery Note / Dispatch Confirmation</label>
          <input id="delivery-notes" type="file" multiple accept=".pdf,.jpg,.jpeg,.png"
            class="block w-full text-sm text-gray-700 file:mr-3 file:py-2 file:px-4 file:rounded file:border-0 file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" />
        </div>

        <div>
          <label for="picklist" class="block text-sm font-medium text-gray-700 mb-1">Picklist / Allocation sheet</label>
          <input id="picklist" type="file" accept=".pdf,.jpg,.jpeg,.png,.xlsx,.csv"
            class="block w-full text-sm text-gray-700 file:mr-3 file:py-2 file:px-4 file:rounded file:border-0 file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" />
        </div>

        <div>
          <label for="photos" class="block text-sm font-medium text-gray-700 mb-1">Photos</label>
          <input id="photos" type="file" multiple accept="image/*"
            class="block w-full text-sm text-gray-700 file:mr-3 file:py-2 file:px-4 file:rounded file:border-0 file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" />
          <p class="text-xs text-gray-500 mt-1">Truck plate, trailer plate, seal photos.</p>
        </div>

        <div class="pt-2">
          <button type="submit" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg shadow-sm">
            Run Check
          </button>
        </div>
      </form>
    </div>
  </section>

  <!-- LOADING -->
  <section id="loading-section" hidden class="mt-8">
    <div class="card bg-white rounded-lg shadow p-10 flex flex-col items-center gap-4">
      <div class="spinner"></div>
      <p id="loading-status" class="text-gray-700 font-medium">Uploading documents...</p>
    </div>
  </section>

  <!-- REPORT -->
  <section id="report-section" hidden class="mt-8"></section>

</main>

<footer class="border-t border-gray-200 bg-white mt-12">
  <div class="max-w-6xl mx-auto px-6 py-6 text-sm text-gray-500 flex flex-col md:flex-row gap-2 md:justify-between">
    <div>EHC Checker v0.1 — Development build</div>
    <div class="flex gap-4">
      <a href="https://github.com/silwww/ehc-checker" class="hover:text-blue-600">GitHub</a>
      <span>Original rule set by RR Cunningham</span>
    </div>
  </div>
</footer>

<script>
(function(){
  const form = document.getElementById('check-form');
  const upload = document.getElementById('upload-section');
  const loading = document.getElementById('loading-section');
  const loadingStatus = document.getElementById('loading-status');
  const report = document.getElementById('report-section');

  let progressInterval = null;
  let currentCertRef = '';

  function escapeHtml(text) {
    if (text === null || text === undefined) return '';
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function startProgressiveMessages() {
    const messages = [
      'Uploading documents...',
      'Reading certificate...',
      'Running rule set check...',
      'Analysing stamps and signatures...',
      'Verifying Part II deletions...',
      'Generating report...'
    ];
    let index = 0;
    loadingStatus.textContent = messages[0];
    progressInterval = setInterval(() => {
      index = (index + 1) % messages.length;
      loadingStatus.textContent = messages[index];
    }, 3000);
  }

  function stopProgressiveMessages() {
    if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
  }

  async function runCheck(event) {
    event.preventDefault();

    const ehcPdfInput = document.getElementById('ehc-pdf');
    if (!ehcPdfInput.files || ehcPdfInput.files.length === 0) {
      alert('Please select an EHC PDF file.');
      return;
    }

    const formData = new FormData();
    formData.append('ehc_pdf', ehcPdfInput.files[0]);
    formData.append('certificate_type', document.getElementById('cert-type').value);

    const dnInput = document.getElementById('delivery-notes');
    if (dnInput && dnInput.files) {
      for (const file of dnInput.files) formData.append('delivery_note', file);
    }
    const picklistInput = document.getElementById('picklist');
    if (picklistInput && picklistInput.files) {
      for (const file of picklistInput.files) formData.append('picklist', file);
    }
    const photosInput = document.getElementById('photos');
    if (photosInput && photosInput.files) {
      for (const file of photosInput.files) formData.append('photos', file);
    }

    upload.hidden = true;
    report.hidden = true;
    loading.hidden = false;
    startProgressiveMessages();

    try {
      const response = await fetch('/.netlify/functions/check', {
        method: 'POST',
        body: formData
      });
      stopProgressiveMessages();

      if (!response.ok) {
        let errorData = {};
        try { errorData = await response.json(); } catch (_) {}
        loading.hidden = true;
        showError(errorData.error || 'Check failed', errorData.message || `HTTP ${response.status}`);
        return;
      }

      const reportData = await response.json();
      loading.hidden = true;
      renderReport(reportData);
    } catch (error) {
      stopProgressiveMessages();
      loading.hidden = true;
      showError('Network error', error.message);
    }
  }

  form.addEventListener('submit', runCheck);

  function renderReport(data) {
    const info = data.certificate_info || {};
    currentCertRef = info.certificate_ref || '';

    const verdictClass = {
      'PASS': 'bg-green-50 border-green-300 text-green-800',
      'HOLD': 'bg-amber-50 border-amber-300 text-amber-800'
    }[data.overall_verdict] || 'bg-gray-50 border-gray-300 text-gray-800';

    const counters = data.counters || { hard_errors: 0, medium_warnings: 0, low_notices: 0 };

    let html = '';

    html += `
      <div class="flex items-center justify-between mb-4 no-print">
        <h2 class="text-xl font-semibold">Check Report</h2>
        <div class="flex gap-2">
          <button id="btn-download-pdf" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium px-4 py-2 rounded disabled:opacity-60 disabled:cursor-not-allowed">Download PDF</button>
          <button id="btn-new" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded">New Check</button>
        </div>
      </div>`;

    html += `
      <div class="card rounded-lg shadow p-6 mb-6 border-2 ${verdictClass}">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div>
            <div class="text-sm font-medium uppercase tracking-wide">Overall verdict</div>
            <div class="text-5xl font-bold mt-1">${escapeHtml(data.overall_verdict || '—')}</div>
          </div>
          <div class="flex gap-3 flex-wrap">
            <div class="bg-white border border-red-300 rounded px-4 py-2 text-center">
              <div class="text-2xl font-bold text-red-700">${counters.hard_errors}</div>
              <div class="text-xs text-red-800 uppercase">Hard Errors</div>
            </div>
            <div class="bg-white border border-amber-300 rounded px-4 py-2 text-center">
              <div class="text-2xl font-bold text-amber-700">${counters.medium_warnings}</div>
              <div class="text-xs text-amber-800 uppercase">Medium Warnings</div>
            </div>
            <div class="bg-white border border-blue-300 rounded px-4 py-2 text-center">
              <div class="text-2xl font-bold text-blue-700">${counters.low_notices}</div>
              <div class="text-xs text-blue-800 uppercase">Low Notices</div>
            </div>
          </div>
        </div>
      </div>`;

    const netWt = (info.net_weight_kg != null) ? (Number(info.net_weight_kg).toLocaleString() + ' KG') : 'N/A';
    const transportText = escapeHtml(info.transport || 'N/A') + (info.vehicle_id ? '. I.15 ID: ' + escapeHtml(info.vehicle_id) : '');

    html += `
      <div class="card bg-white rounded-lg shadow p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <dl class="kv">
            <dt>Certificate Ref</dt><dd>${escapeHtml(info.certificate_ref || 'N/A')}</dd>
            <dt>Certificate Type</dt><dd>EHC ${escapeHtml(info.certificate_type || 'N/A')}</dd>
            <dt>Filename</dt><dd class="break-all">${escapeHtml(info.filename || 'N/A')}</dd>
            <dt>OV</dt><dd>${escapeHtml(info.ov_name || 'N/A')}</dd>
            <dt>SP Reference</dt><dd>${escapeHtml(info.sp_reference || 'N/A')}</dd>
            <dt>RCVS No</dt><dd>${escapeHtml(info.rcvs_number || 'N/A')}</dd>
            <dt>BCP</dt><dd>${escapeHtml(info.bcp_name || 'N/A')}${info.bcp_country ? ' (' + escapeHtml(info.bcp_country) + ')' : ''}</dd>
            <dt>Language</dt><dd>${escapeHtml(info.second_language || 'N/A')}</dd>
          </dl>
          <dl class="kv">
            <dt>Consignor</dt><dd>${escapeHtml(info.consignor || 'N/A')}</dd>
            <dt>Consignee</dt><dd>${escapeHtml(info.consignee || 'N/A')}</dd>
            <dt>I.6 Operator</dt><dd>${escapeHtml(info.i6_operator || 'N/A')}</dd>
            <dt>Dispatch establishment</dt><dd>${escapeHtml(info.dispatch_establishment || 'N/A')}</dd>
            <dt>Loading</dt><dd>${escapeHtml(info.loading || 'N/A')}</dd>
            <dt>Destination</dt><dd>${escapeHtml(info.destination || 'N/A')}</dd>
            <dt>Commodity</dt><dd>${escapeHtml(info.commodity || 'N/A')}</dd>
            <dt>HS Code</dt><dd>${escapeHtml(info.hs_code || 'N/A')}</dd>
            <dt>Net weight</dt><dd>${netWt}</dd>
            <dt>Packages</dt><dd>${escapeHtml(info.packages || 'N/A')}</dd>
            <dt>Departure</dt><dd>${escapeHtml(info.departure_date || 'N/A')}</dd>
            <dt>Signing date</dt><dd>${escapeHtml(info.signing_date || 'N/A')}</dd>
            <dt>Transport</dt><dd>${transportText}</dd>
            <dt>Trailer</dt><dd>${escapeHtml(info.trailer || 'N/A')}</dd>
            <dt>Seal</dt><dd>${escapeHtml(info.seal || 'N/A')}</dd>
            <dt>Pages</dt><dd>${escapeHtml(info.pages || 'N/A')}</dd>
          </dl>
        </div>
      </div>`;

    html += '<div class="card bg-white rounded-lg shadow p-6 mb-6"><h3 class="text-lg font-semibold mb-4">Flags</h3>';
    if (data.flags && data.flags.length > 0) {
      html += '<div class="space-y-3">';
      for (const flag of data.flags) {
        const cls = {
          hard: { box:'bg-red-50 border-red-300', text:'text-red-900', pill:'pill-hard', label:'HARD' },
          medium: { box:'bg-amber-50 border-amber-300', text:'text-amber-900', pill:'pill-med', label:'MEDIUM' },
          low: { box:'bg-blue-50 border-blue-300', text:'text-blue-900', pill:'pill-low', label:'LOW' }
        }[flag.severity] || { box:'bg-gray-50 border-gray-300', text:'text-gray-800', pill:'pill-low', label:(flag.severity||'').toUpperCase() };
        html += `
          <div class="${cls.box} border rounded p-4">
            <div class="flex items-center gap-2 mb-1">
              <span class="pill ${cls.pill}">${cls.label}</span>
              <span class="text-sm ${cls.text} font-medium">${escapeHtml(flag.field_reference || '')}</span>
            </div>
            <h4 class="font-semibold ${cls.text}">${escapeHtml(flag.title || '')}</h4>
            <p class="text-sm ${cls.text} mt-1">${escapeHtml(flag.description || '')}</p>
          </div>`;
      }
      html += '</div>';
    } else {
      html += '<p class="text-sm text-gray-500">No flags raised — the certificate passed all checks.</p>';
    }
    html += '</div>';

    html += '<div class="card bg-white rounded-lg shadow p-6 mb-6"><h3 class="text-lg font-semibold mb-4">Full Check Report</h3>';
    for (const section of (data.sections || [])) {
      html += `<h4 class="font-semibold mt-4 mb-2">${section.section_number}. ${escapeHtml(section.title)}</h4>`;
      html += '<table class="report"><thead><tr><th>Check</th><th>Result</th><th>Detail</th></tr></thead><tbody>';
      for (const check of (section.checks || [])) {
        const pillCls = {
          PASS: 'pill-pass', FAIL: 'pill-hard', WARNING: 'pill-med', NOTICE: 'pill-low'
        }[check.result] || '';
        const resultHtml = pillCls
          ? `<span class="pill ${pillCls}">${escapeHtml(check.result)}</span>`
          : escapeHtml(check.result || '');
        html += `<tr><td>${escapeHtml(check.check_name)}</td><td>${resultHtml}</td><td>${escapeHtml(check.detail)}</td></tr>`;
      }
      html += '</tbody></table>';
    }

    if (data.rule_set_update_recommendations && data.rule_set_update_recommendations.trim()) {
      html += `<h4 class="font-semibold mt-6 mb-2">Rule Set Update Recommendations</h4>
        <p class="text-sm text-gray-700 whitespace-pre-wrap">${escapeHtml(data.rule_set_update_recommendations)}</p>`;
    }
    html += '</div>';

    const tokens = data.tokens_used || {};
    const tokenStr = tokens.input != null
      ? ` · Tokens: ${tokens.input} in / ${tokens.output} out${tokens.cache_read ? ' (' + tokens.cache_read + ' cached)' : ''}`
      : '';
    html += `
      <div class="text-xs text-gray-500 text-center border-t border-gray-200 pt-4">
        Rule Set ${escapeHtml(data.rule_set_version || 'v1.7')}
        · Model: ${escapeHtml(data.checker_model || 'claude-sonnet-4-5')}
        · Processing: ${data.processing_time_seconds ? data.processing_time_seconds.toFixed(1) : 'N/A'}s${tokenStr}
      </div>`;

    report.innerHTML = html;
    report.hidden = false;

    document.getElementById('btn-download-pdf').addEventListener('click', downloadPDF);
    document.getElementById('btn-new').addEventListener('click', resetForm);

    report.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showError(title, message) {
    report.innerHTML = `
      <div class="bg-red-50 border-2 border-red-300 rounded-lg p-6">
        <div class="flex items-start gap-3">
          <div class="text-red-600 text-2xl">⚠️</div>
          <div class="flex-1">
            <div class="text-lg font-semibold text-red-900 mb-2">${escapeHtml(title)}</div>
            <div class="text-sm text-red-800 mb-4 whitespace-pre-wrap">${escapeHtml(message || 'Please try again or contact support if the issue persists.')}</div>
            <button id="btn-error-retry" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded font-medium">Try again</button>
          </div>
        </div>
      </div>`;
    report.hidden = false;
    document.getElementById('btn-error-retry').addEventListener('click', resetForm);
    report.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetForm() {
    form.reset();
    report.hidden = true;
    report.innerHTML = '';
    loading.hidden = true;
    upload.hidden = false;
    upload.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  async function downloadPDF() {
    const reportElement = document.getElementById('report-section');
    if (!reportElement) return;
    const button = document.getElementById('btn-download-pdf');
    const originalText = button.textContent;
    button.textContent = 'Generating PDF...';
    button.disabled = true;
    try {
      const canvas = await html2canvas(reportElement, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff'
      });
      const imgData = canvas.toDataURL('image/png');
      const pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const imgWidth = 210;
      const pageHeight = 297;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;
      let heightLeft = imgHeight;
      let position = 0;
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
      while (heightLeft > 0) {
        position = heightLeft - imgHeight;
        pdf.addPage();
        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;
      }
      const today = new Date();
      const dd = String(today.getDate()).padStart(2, '0');
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const yyyy = today.getFullYear();
      const safeRef = (currentCertRef || 'EHC').replace(/[/\\\s]+/g, '-');
      pdf.save(`EHC_Check_Report_${safeRef}_${dd}_${mm}_${yyyy}.pdf`);
    } catch (error) {
      console.error('PDF generation failed:', error);
      alert('PDF generation failed. Please try again.');
    } finally {
      button.textContent = originalText;
      button.disabled = false;
    }
  }
})();
</script>
</body>
</html>
