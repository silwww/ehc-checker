<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EHC Checker — UK Export Health Certificate verification</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --font-head: 'Poppins', system-ui, sans-serif; --font-body: 'DM Sans', system-ui, sans-serif; }
  body { font-family: var(--font-body); color: #374151; background: #f9fafb; }
  h1,h2,h3,h4,h5,h6 { font-family: var(--font-head); color: #111827; }
  .spinner { width:42px; height:42px; border:4px solid #dbeafe; border-top-color:#2563eb; border-radius:50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .kv { display:grid; grid-template-columns: max-content 1fr; gap:4px 12px; font-size: 0.875rem; }
  .kv dt { color:#6b7280; font-weight:500; }
  .kv dd { color:#111827; }
  table.report { width:100%; border-collapse: collapse; font-size: 0.875rem; }
  table.report th, table.report td { border:1px solid #e5e7eb; padding:8px 10px; text-align:left; vertical-align: top; }
  table.report th { background:#f3f4f6; font-family: var(--font-head); font-weight:600; color:#111827; }
  .pill { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:0.75rem; font-weight:600; }
  .pill-pass { background:#dcfce7; color:#166534; }
  .pill-hard { background:#fee2e2; color:#991b1b; }
  .pill-med  { background:#fef3c7; color:#92400e; }
  .pill-low  { background:#dbeafe; color:#1e40af; }
  @media print {
    body { background:#fff; }
    header, footer, #upload-section, #loading-section, .no-print { display:none !important; }
    #report-section { display:block !important; }
    .shadow, .shadow-sm, .shadow-md, .shadow-lg { box-shadow:none !important; }
    .bg-red-50, .bg-amber-50, .bg-blue-50, .bg-green-50 { background:#fff !important; }
    main { padding:0 !important; }
    .card { border:1px solid #e5e7eb; page-break-inside: avoid; }
  }
</style>
</head>
<header class="bg-white border-b border-gray-200">
  <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between gap-4 flex-wrap">
    <div>
      <h1 class="text-2xl font-bold">EHC Checker</h1>
      <p class="text-sm text-gray-500">UK Export Health Certificate verification</p>
    </div>
    <div class="flex items-center gap-3">
      <span class="pill pill-pass">Rule Set v1.7 — April 2026</span>
      <a href="admin.html" class="text-sm text-blue-600 hover:text-blue-700 font-medium">Admin →</a>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-8">

  <!-- UPLOAD -->
  <section id="upload-section">
    <div class="card bg-white rounded-lg shadow p-6 md:p-8">
      <h2 class="text-xl font-semibold mb-1">Run a check</h2>
      <p class="text-sm text-gray-500 mb-6">Upload the EHC PDF and any supporting documents.</p>

      <form id="check-form" class="space-y-5">
        <div>
          <label for="cert-type" class="block text-sm font-medium text-gray-700 mb-1">Certificate type</label>
          <select id="cert-type" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
            <option value="auto">Auto-detect from PDF</option>
            <option value="8468">EHC 8468 — Dairy for human consumption</option>
            <option value="8322">EHC 8322 — Dairy not for human consumption (Cat 3 ABP)</option>
          </select>
        </div>

        <div>
          <label for="ehc-pdf" class="block text-sm font-medium text-gray-700 mb-1">EHC PDF <span class="text-red-600">*</span></label>
          <input id="ehc-pdf" type="file" accept=".pdf" required
            class="block w-full text-sm text-gray-700 file:mr-3 file:py-2 file:px-4 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
        </div>

        <div>
          <label for="delivery-notes" class="block text-sm font-medium text-gray-700 mb-1">Delivery Note / Dispatch Confirmation</label>
          <input id="delivery-notes" type="file" multiple accept=".pdf,.jpg,.jpeg,.png"
            class="block w-full text-sm text-gray-700 file:mr-3 file:py-2 file:px-4 file:rounded file:border-0 file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" />
        </div>

        <div>
          <label for="picklist" class="block text-sm font-medium text-gray-700 mb-1">Picklist / Allocation sheet</label>
          <input id="picklist" type="file" accept=".pdf,.jpg,.jpeg,.png,.xlsx,.csv"
            class="block w-full text-sm text-gray-700 file:mr-3 file:py-2 file:px-4 file:rounded file:border-0 file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" />
        </div>

        <div>
          <label for="photos" class="block text-sm font-medium text-gray-700 mb-1">Photos</label>
          <input id="photos" type="file" multiple accept="image/*"
            class="block w-full text-sm text-gray-700 file:mr-3 file:py-2 file:px-4 file:rounded file:border-0 file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" />
          <p class="text-xs text-gray-500 mt-1">Truck plate, trailer plate, seal photos.</p>
        </div>

        <div class="pt-2">
          <button type="submit" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg shadow-sm">
            Run Check
          </button>
        </div>
      </form>
    </div>
  </section>

  <!-- LOADING -->
  <section id="loading-section" hidden class="mt-8">
    <div class="card bg-white rounded-lg shadow p-10 flex flex-col items-center gap-4">
      <div class="spinner"></div>
      <p id="loading-status" class="text-gray-700 font-medium">Uploading documents...</p>
    </div>
  </section>

  <!-- REPORT -->
  <section id="report-section" hidden class="mt-8"></section>

</main>

<footer class="border-t border-gray-200 bg-white mt-12">
  <div class="max-w-6xl mx-auto px-6 py-6 text-sm text-gray-500 flex flex-col md:flex-row gap-2 md:justify-between">
    <div>EHC Checker v0.1 — Development build</div>
    <div class="flex gap-4">
      <a href="https://github.com/silwww/ehc-checker" class="hover:text-blue-600">GitHub</a>
      <span>Original rule set by RR Cunningham</span>
    </div>
  </div>
</footer>

<script>
(function(){
  const form = document.getElementById('check-form');
  const upload = document.getElementById('upload-section');
  const loading = document.getElementById('loading-section');
  const status = document.getElementById('loading-status');
  const report = document.getElementById('report-section');

  const steps = ['Uploading documents...', 'Reading certificate...', 'Running rule set check...', 'Generating report...'];

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const file = document.getElementById('ehc-pdf').files[0];
    if (!file) { alert('Please upload an EHC PDF.'); return; }

    upload.hidden = true;
    report.hidden = true;
    loading.hidden = false;
    let i = 0;
    status.textContent = steps[0];
    const iv = setInterval(()=>{
      i++;
      if (i < steps.length) status.textContent = steps[i];
    }, 700);

    setTimeout(()=>{
      clearInterval(iv);
      loading.hidden = true;
      report.hidden = false;
      report.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 3000);
  });

  async function downloadPDF() {
    const reportElement = document.getElementById('report-section');
    if (!reportElement) return;
    const button = document.getElementById('btn-download-pdf');
    const originalText = button.textContent;
    button.textContent = 'Generating PDF...';
    button.disabled = true;
    try {
      const canvas = await html2canvas(reportElement, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff'
      });
      const imgData = canvas.toDataURL('image/png');
      const pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const imgWidth = 210;
      const pageHeight = 297;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;
      let heightLeft = imgHeight;
      let position = 0;
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
      while (heightLeft > 0) {
        position = heightLeft - imgHeight;
        pdf.addPage();
        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;
      }
      const today = new Date();
      const dd = String(today.getDate()).padStart(2, '0');
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const yyyy = today.getFullYear();
      pdf.save(`EHC_Check_Report_26-2-094825_${dd}_${mm}_${yyyy}.pdf`);
    } catch (error) {
      console.error('PDF generation failed:', error);
      alert('PDF generation failed. Please try again.');
    } finally {
      button.textContent = originalText;
      button.disabled = false;
    }
  }
  document.getElementById('btn-download-pdf').addEventListener('click', downloadPDF);
  document.getElementById('btn-new').addEventListener('click', ()=>{
    form.reset();
    report.hidden = true;
    loading.hidden = true;
    upload.hidden = false;
    upload.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
})();
</script>
</body>
</html>
